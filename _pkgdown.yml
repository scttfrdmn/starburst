  structure:
    left: [intro, reference, articles, examples, news]
    right: [search, github]
  components:
    home: ~
    intro:
      text: Get Started
      href: articles/getting-started.html
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Examples
      menu:
      - text: "Getting Started"
        href: articles/getting-started.html
      - text: "---"
      - text: "Data Processing Examples"
      - text: "Monte Carlo Simulation"
        href: articles/example-monte-carlo.html
      - text: "Bulk API Calls"
        href: articles/example-api-calls.html
      - text: "Geospatial Analysis"
        href: articles/example-geospatial.html
      - text: "Model Grid Search"
        href: articles/example-grid-search.html
      - text: "---"
      - text: "Business Use Cases"
      - text: "Financial Risk Modeling"
        href: articles/example-risk-modeling.html
      - text: "ML Feature Engineering"
        href: articles/example-feature-engineering.html
      - text: "A/B Test Analysis"
        href: articles/example-bootstrap.html
      - text: "Report Generation"
        href: articles/example-reports.html
      - text: "---"
      - text: "Guides"
      - text: "Workload Shapes: When & How to Use It"
        href: articles/workload-shapes.html
      - text: "Performance & When to Use Cloud"
        href: articles/performance.html
