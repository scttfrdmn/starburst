url: https://starburst.ing
template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    primary: "#0066cc"

home:
  title: "staRburst • Seamless AWS Cloud Bursting for R"
  description: >
    Scale R to 100+ AWS workers with one line. Zero infrastructure management,
    automatic environment sync, and transparent cost tracking.

